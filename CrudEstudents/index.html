<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Estudiantes</title>
    <link rel="stylesheet" href="Style/style.css">
</head>
<body>
    <header class="encabezado">
        <h2>Gestión de Estudiantes</h2>
        <button class="btn-rojo" onclick="window.location.href='login.html'">Cerrar Sesión</button>
    </header>

    <main>
        <div class="formulario">
            <input type="hidden" id="idEstudiante">
            
            <div class="campo">
                <label>Nombre Completo:</label>
                <input type="text" id="nombre" placeholder="Solo letras">
            </div>

            <div class="campo">
                <label>Correo Electrónico:</label>
                <input type="email" id="correo" placeholder="correo@ejemplo.com">
            </div>

            <div class="campo">
                <label>WhatsApp:</label>
                <input type="text" id="whatsapp" placeholder="10 dígitos">
            </div>

            <div class="campo">
                <label>Fecha de Nacimiento:</label>
                <input type="date" id="fechaNacimiento">
            </div>

            <div class="campo ancho-total">
                <label>Observaciones (Opcional):</label>
                <textarea id="observaciones" rows="2"></textarea>
            </div>

            <button id="btnGuardar" class="btn-verde" onclick="guardarEstudiante()">Guardar Estudiante</button>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>WhatsApp</th>
                        <th>Edad</th>
                        <th>Observaciones</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaCuerpo"></tbody>
            </table>
        </div>
    </main>
    <script src="Js/script.js"></script>
</body>
</html>
